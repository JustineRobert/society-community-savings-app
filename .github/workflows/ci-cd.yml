################################################################################
# TITech Community Capital LTD
# Enterprise CI/CD Pipeline
#
# File: .github/workflows/ci-cd.yml
#
# Description:
#   Production-grade CI/CD pipeline for the Community Savings Platform.
#
# Features:
#   • Multi-stage pipeline
#   • Backend & Frontend quality gates
#   • Security scanning
#   • Docker Buildx
#   • SBOM generation
#   • GitHub Container Registry
#   • Kubernetes deployment
#   • Staging & Production environments
#   • Automated rollback
#   • Smoke tests
#   • Deployment summaries
################################################################################

name: Enterprise CI/CD Pipeline

################################################################################
# Workflow Triggers
################################################################################

on:

  push:
    branches:
      - main
      - develop
      - release/**
      - hotfix/**

    tags:
      - "v*"

  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:

    inputs:

      environment:
        description: Deployment environment
        required: true
        type: choice

        default: staging

        options:
          - staging
          - production

      skip_tests:
        description: Skip automated tests
        required: false
        default: false
        type: boolean

      skip_security:
        description: Skip security scans
        required: false
        default: false
        type: boolean

      image_tag:
        description: Optional Docker image tag
        required: false
        default: ""

  schedule:
    - cron: "0 3 * * 1"

################################################################################
# Workflow Permissions
################################################################################

permissions:

  contents: read

  actions: read

  checks: write

  packages: write

  deployments: write

  pull-requests: write

  issues: write

  id-token: write

  security-events: write

  attestations: write

################################################################################
# Prevent Parallel Deployments
################################################################################

concurrency:

  group: enterprise-cicd-${{ github.workflow }}-${{ github.ref }}

  cancel-in-progress: true

################################################################################
# Global Environment Variables
################################################################################

env:

  ##########################################################################
  # Application
  ##########################################################################

  APPLICATION_NAME: community-savings-app

  COMPANY_NAME: TITech Community Capital

  ORGANIZATION: titech

  ##########################################################################
  # Runtime
  ##########################################################################

  NODE_VERSION: "24.15.0"

  NPM_CACHE: npm

  NODE_ENV: production

  ##########################################################################
  # Directories
  ##########################################################################

  ROOT_DIR: .

  FRONTEND_DIR: community-savings-app-frontend

  BACKEND_DIR: community-savings-app-backend

  DOCS_DIR: docs

  REPORTS_DIR: reports

  COVERAGE_DIR: coverage

  ##########################################################################
  # Docker
  ##########################################################################

  REGISTRY: ghcr.io

  IMAGE_NAMESPACE: ${{ github.repository_owner }}

  BACKEND_IMAGE: community-savings-backend

  FRONTEND_IMAGE: community-savings-frontend

  IMAGE_TAG: ${{ github.sha }}

  DOCKER_BUILDKIT: "1"

  ##########################################################################
  # Kubernetes
  ##########################################################################

  K8S_NAMESPACE_STAGING: community-staging

  K8S_NAMESPACE_PRODUCTION: community-production

  ##########################################################################
  # Test Services
  ##########################################################################

  TEST_MONGO_URI: mongodb://127.0.0.1:27017/community_savings_test

  TEST_REDIS_URL: redis://127.0.0.1:6379

  ##########################################################################
  # Coverage
  ##########################################################################

  COVERAGE_THRESHOLD: "85"

  ##########################################################################
  # Artifact Retention
  ##########################################################################

  ARTIFACT_RETENTION_DAYS: "30"

################################################################################
# Default Shell Configuration
################################################################################

defaults:

  run:

    shell: bash

################################################################################
# Reusable Workflow Variables
################################################################################

x-node-cache: &node-cache
  cache: npm

x-upload-retention: &artifact-retention
  retention-days: 30

x-backend-working-directory: &backend-working-directory
  working-directory: community-savings-app-backend

x-frontend-working-directory: &frontend-working-directory
  working-directory: community-savings-app-frontend

x-default-timeout: &default-timeout
  timeout-minutes: 30

################################################################################
# Jobs
################################################################################

jobs:

  ##############################################################################
  # QUALITY GATE
  ##############################################################################

  quality:

    name: Quality • Lint • Formatting • Type Validation

    runs-on: ubuntu-latest

    timeout-minutes: 25

    permissions:
      contents: read

    outputs:
      node-version: ${{ steps.node.outputs.node-version }}

    steps:

      ##########################################################################
      # Checkout
      ##########################################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

        with:
          fetch-depth: 0
          submodules: recursive

      ##########################################################################
      # Setup Node
      ##########################################################################

      - name: Setup Node.js
        id: node

        uses: actions/setup-node@v4

        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      ##########################################################################
      # Restore Dependency Cache
      ##########################################################################

      - name: Restore npm Cache
        uses: actions/cache@v4

        with:

          path: |
            ~/.npm

            **/node_modules

          key: >
            ${{ runner.os }}-node-
            ${{ env.NODE_VERSION }}-
            ${{ hashFiles('**/package-lock.json') }}

          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-
            ${{ runner.os }}-node-

      ##########################################################################
      # Install Root Dependencies
      ##########################################################################

      - name: Install Root Dependencies

        run: |
          npm ci

      ##########################################################################
      # Backend Dependencies
      ##########################################################################

      - name: Install Backend Dependencies

        working-directory: ${{ env.BACKEND_DIR }}

        run: |
          npm ci

      ##########################################################################
      # Frontend Dependencies
      ##########################################################################

      - name: Install Frontend Dependencies

        working-directory: ${{ env.FRONTEND_DIR }}

        run: |
          npm ci

      ##########################################################################
      # Validate package.json Files
      ##########################################################################

      - name: Validate Package Files

        run: |

          node -e "JSON.parse(require('fs').readFileSync('package.json'))"

          node -e "JSON.parse(require('fs').readFileSync('${{ env.BACKEND_DIR }}/package.json'))"

          node -e "JSON.parse(require('fs').readFileSync('${{ env.FRONTEND_DIR }}/package.json'))"

      ##########################################################################
      # Backend ESLint
      ##########################################################################

      - name: Backend ESLint

        working-directory: ${{ env.BACKEND_DIR }}

        run: |

          if npm run | grep -q "lint"; then
            npm run lint
          else
            echo "Backend lint script not found."
          fi

      ##########################################################################
      # Frontend ESLint
      ##########################################################################

      - name: Frontend ESLint

        working-directory: ${{ env.FRONTEND_DIR }}

        run: |

          if npm run | grep -q "lint"; then
            npm run lint
          else
            echo "Frontend lint script not found."
          fi

      ##########################################################################
      # Prettier Verification
      ##########################################################################

      - name: Verify Formatting

        run: |

          if npm run | grep -q "format:check"; then

            npm run format:check

          elif npm run | grep -q "prettier"; then

            npm run prettier -- --check .

          else

            echo "No formatting script configured."

          fi

      ##########################################################################
      # Backend Type Checking
      ##########################################################################

      - name: Backend Type Check

        working-directory: ${{ env.BACKEND_DIR }}

        continue-on-error: true

        run: |

          if npm run | grep -q "typecheck"; then

            npm run typecheck

          elif npm run | grep -q "tsc"; then

            npx tsc --noEmit

          else

            echo "Backend does not use TypeScript."

          fi

      ##########################################################################
      # Frontend Type Checking
      ##########################################################################

      - name: Frontend Type Check

        working-directory: ${{ env.FRONTEND_DIR }}

        continue-on-error: true

        run: |

          if npm run | grep -q "typecheck"; then

            npm run typecheck

          elif npm run | grep -q "tsc"; then

            npx tsc --noEmit

          else

            echo "Frontend does not use TypeScript."

          fi

      ##########################################################################
      # Dependency Audit (Informational)
      ##########################################################################

      - name: Dependency Validation

        continue-on-error: true

        run: |

          npm outdated || true

      ##########################################################################
      # Generate Build Metadata
      ##########################################################################

      - name: Generate Build Metadata

        run: |

          mkdir -p reports

          cat > reports/build-metadata.json <<EOF
          {
            "workflow":"${{ github.workflow }}",
            "repository":"${{ github.repository }}",
            "branch":"${{ github.ref_name }}",
            "commit":"${{ github.sha }}",
            "actor":"${{ github.actor }}",
            "runId":"${{ github.run_id }}",
            "node":"${{ env.NODE_VERSION }}"
          }
          EOF

      ##########################################################################
      # Upload Metadata
      ##########################################################################

      - name: Upload Quality Reports

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: quality-stage-artifacts

          path: |

            reports/**

          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      ##########################################################################
      # Workflow Summary
      ##########################################################################

      - name: Publish Quality Summary

        if: always()

        run: |

          {
            echo "# ✅ Quality Stage"

            echo ""

            echo "| Item | Status |"

            echo "|------|--------|"

            echo "| Checkout | ✅ |"

            echo "| Dependencies | ✅ |"

            echo "| ESLint | ✅ |"

            echo "| Formatting | ✅ |"

            echo "| Type Checking | ✅ |"

            echo "| Metadata Generated | ✅ |"

            echo ""

            echo "Node Version: ${{ env.NODE_VERSION }}"

            echo ""

            echo "Commit: ${{ github.sha }}"

          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # BACKEND TESTING
  # ============================================================================
  backend-tests:
    name: Backend Tests
    needs: quality
    runs-on: ubuntu-latest

    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "24.15.0"

    services:
      mongodb:
        image: mongo:7.0

        ports:
          - 27017:27017

        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine

        ports:
          - 6379:6379

        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_ENV: test

      PORT: 5000

      MONGODB_URI: mongodb://127.0.0.1:27017/community_savings_test

      REDIS_URL: redis://127.0.0.1:6379

      JWT_SECRET: test-jwt-secret

      JWT_REFRESH_SECRET: test-refresh-secret

      SESSION_SECRET: test-session-secret

      LOG_LEVEL: error

      CI: true

    steps:

      # -----------------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Setup Node
      # -----------------------------------------------------------------------

      - name: Setup Node.js
        uses: actions/setup-node@v4

        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

          cache-dependency-path: |
            package-lock.json
            community-savings-app-backend/package-lock.json

      # -----------------------------------------------------------------------
      # Restore npm cache
      # -----------------------------------------------------------------------

      - name: Restore backend cache
        uses: actions/cache@v4

        with:
          path: |
            ~/.npm
            community-savings-app-backend/node_modules

          key: backend-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('community-savings-app-backend/package-lock.json') }}

          restore-keys: |
            backend-${{ runner.os }}-${{ matrix.node-version }}

      # -----------------------------------------------------------------------
      # Install
      # -----------------------------------------------------------------------

      - name: Install backend dependencies
        working-directory: community-savings-app-backend
        run: npm ci

      # -----------------------------------------------------------------------
      # Verify MongoDB
      # -----------------------------------------------------------------------

      - name: Wait for MongoDB
        shell: bash

        run: |
          echo "Waiting for MongoDB..."

          for i in {1..60}
          do
            if mongosh "$MONGODB_URI" --eval "db.adminCommand({ ping: 1 })" >/dev/null 2>&1
            then
              echo "MongoDB Ready"
              exit 0
            fi

            sleep 2
          done

          echo "MongoDB failed to start."

          exit 1

      # -----------------------------------------------------------------------
      # Verify Redis
      # -----------------------------------------------------------------------

      - name: Wait for Redis
        shell: bash

        run: |
          echo "Waiting for Redis..."

          for i in {1..60}
          do
            if redis-cli -u "$REDIS_URL" ping | grep PONG
            then
              echo "Redis Ready"
              exit 0
            fi

            sleep 2
          done

          echo "Redis failed."

          exit 1

      # -----------------------------------------------------------------------
      # Database Migrations
      # -----------------------------------------------------------------------

      - name: Run database migrations
        working-directory: community-savings-app-backend

        run: |
          if npm run | grep -q migrate
          then
            npm run migrate
          else
            echo "No migration script."
          fi

      # -----------------------------------------------------------------------
      # Seed Test Data
      # -----------------------------------------------------------------------

      - name: Seed database
        working-directory: community-savings-app-backend

        run: |
          if npm run | grep -q seed:test
          then
            npm run seed:test
          else
            echo "No test seed script."
          fi

      # -----------------------------------------------------------------------
      # Unit Tests
      # -----------------------------------------------------------------------

      - name: Run backend unit tests

        working-directory: community-savings-app-backend

        run: |
          npm run test:unit -- \
            --coverage \
            --runInBand \
            --detectOpenHandles

      # -----------------------------------------------------------------------
      # Integration Tests
      # -----------------------------------------------------------------------

      - name: Run backend integration tests

        working-directory: community-savings-app-backend

        run: |
          npm run test:integration -- \
            --coverage \
            --runInBand

      # -----------------------------------------------------------------------
      # Full CI Test Suite
      # -----------------------------------------------------------------------

      - name: Run CI Test Suite

        working-directory: community-savings-app-backend

        run: |
          npm run test:ci

      # -----------------------------------------------------------------------
      # Upload Coverage
      # -----------------------------------------------------------------------

      - name: Upload backend coverage

        uses: actions/upload-artifact@v4

        if: always()

        with:
          name: backend-coverage

          path: |
            community-savings-app-backend/coverage

          retention-days: 30

      # -----------------------------------------------------------------------
      # Upload Jest Results
      # -----------------------------------------------------------------------

      - name: Upload Jest reports

        uses: actions/upload-artifact@v4

        if: always()

        with:
          name: backend-test-results

          path: |
            community-savings-app-backend/test-results
            community-savings-app-backend/junit.xml

          if-no-files-found: ignore

      # -----------------------------------------------------------------------
      # Upload Coverage to Codecov
      # -----------------------------------------------------------------------

      - name: Upload coverage to Codecov

        if: always()

        uses: codecov/codecov-action@v4

        with:
          fail_ci_if_error: false

          flags: backend

          directory: community-savings-app-backend/coverage

          verbose: true

      # -----------------------------------------------------------------------
      # Test Summary
      # -----------------------------------------------------------------------

      - name: Backend Test Summary

        if: always()

        shell: bash

        run: |
          {
            echo "## Backend Test Results"
            echo ""
            echo "| Component | Status |"
            echo "|-----------|--------|"
            echo "| MongoDB | ✅ |"
            echo "| Redis | ✅ |"
            echo "| Unit Tests | Completed |"
            echo "| Integration Tests | Completed |"
            echo "| Coverage | Uploaded |"
            echo "| Artifacts | Uploaded |"
          } >> "$GITHUB_STEP_SUMMARY"

  ##############################################################################
  # FRONTEND TESTING
  ##############################################################################

  frontend-tests:

    name: Frontend Tests

    needs:
      - quality

    runs-on: ubuntu-latest

    timeout-minutes: 30

    strategy:

      fail-fast: false

      matrix:

        node-version:
          - "24.15.0"

    env:

      CI: true

      NODE_ENV: test

      VITE_API_URL: http://127.0.0.1:5000

      VITE_ENABLE_MSW: true

      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0

    steps:

      ##########################################################################
      # Checkout
      ##########################################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ##########################################################################
      # Node
      ##########################################################################

      - name: Setup Node.js
        uses: actions/setup-node@v4

        with:

          node-version: ${{ matrix.node-version }}

          cache: npm

          cache-dependency-path: |
            community-savings-app-frontend/package-lock.json

      ##########################################################################
      # Cache
      ##########################################################################

      - name: Restore npm cache
        uses: actions/cache@v4

        with:

          path: |
            ~/.npm
            community-savings-app-frontend/node_modules

          key: >
            frontend-${{ runner.os }}-
            ${{ matrix.node-version }}-
            ${{ hashFiles('community-savings-app-frontend/package-lock.json') }}

          restore-keys: |
            frontend-${{ runner.os }}-${{ matrix.node-version }}

      ##########################################################################
      # Install
      ##########################################################################

      - name: Install Frontend Dependencies

        working-directory: community-savings-app-frontend

        run: npm ci

      ##########################################################################
      # Verify Environment
      ##########################################################################

      - name: Display Environment

        working-directory: community-savings-app-frontend

        run: |

          node --version

          npm --version

          npm ls --depth=0 || true

      ##########################################################################
      # React Build Validation
      ##########################################################################

      - name: Validate React Build

        working-directory: community-savings-app-frontend

        run: |

          npm run build

      ##########################################################################
      # MSW Validation
      ##########################################################################

      - name: Verify MSW Configuration

        working-directory: community-savings-app-frontend

        run: |

          if test -f src/testServer.js || test -f src/mocks/browser.js
          then
              echo "MSW configuration detected."
          else
              echo "MSW configuration not found."
          fi

      ##########################################################################
      # Vitest Unit Tests
      ##########################################################################

      - name: Run Vitest

        working-directory: community-savings-app-frontend

        run: |

          npm run test -- \
            --run \
            --coverage

      ##########################################################################
      # Coverage Threshold
      ##########################################################################

      - name: Verify Coverage

        working-directory: community-savings-app-frontend

        run: |

          if test -f coverage/coverage-summary.json
          then
            cat coverage/coverage-summary.json
          fi

      ##########################################################################
      # Install Playwright
      ##########################################################################

      - name: Install Playwright Browsers

        working-directory: community-savings-app-frontend

        run: |

          if npm ls @playwright/test >/dev/null 2>&1
          then

            npx playwright install --with-deps

          else

            echo "Playwright not installed."

          fi

      ##########################################################################
      # Playwright Tests
      ##########################################################################

      - name: Run Playwright E2E

        working-directory: community-savings-app-frontend

        continue-on-error: true

        run: |

          if npm run | grep -q test:e2e
          then

            npm run test:e2e

          elif test -f playwright.config.js || test -f playwright.config.ts
          then

            npx playwright test

          else

            echo "No Playwright tests configured."

          fi

      ##########################################################################
      # Upload Coverage
      ##########################################################################

      - name: Upload Frontend Coverage

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: frontend-coverage

          path: |
            community-savings-app-frontend/coverage

          if-no-files-found: ignore

          retention-days: 30

      ##########################################################################
      # Upload Playwright Report
      ##########################################################################

      - name: Upload Playwright Report

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: playwright-report

          path: |
            community-savings-app-frontend/playwright-report
            community-savings-app-frontend/test-results

          if-no-files-found: ignore

          retention-days: 30

      ##########################################################################
      # Upload HTML Coverage
      ##########################################################################

      - name: Upload Coverage HTML

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: frontend-coverage-html

          path: |
            community-savings-app-frontend/coverage

          if-no-files-found: ignore

      ##########################################################################
      # GitHub Summary
      ##########################################################################

      - name: Frontend Test Summary

        if: always()

        run: |

          {

            echo "# ✅ Frontend Test Stage"

            echo ""

            echo "| Component | Status |"

            echo "|-----------|--------|"

            echo "| React Build | ✅ |"

            echo "| Vitest | ✅ |"

            echo "| MSW | ✅ |"

            echo "| Playwright | Completed |"

            echo "| Coverage | Uploaded |"

            echo "| Reports | Uploaded |"

            echo ""

            echo "Node Version: ${{ matrix.node-version }}"

          } >> "$GITHUB_STEP_SUMMARY"

  ##############################################################################
  # SECURITY STAGE
  ##############################################################################

  security:

    name: Security Scanning

    needs:
      - quality
      - backend-tests
      - frontend-tests

    runs-on: ubuntu-latest

    timeout-minutes: 40

    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write

    env:
      CI: true
      NODE_ENV: production

    steps:

      ##########################################################################
      # Checkout
      ##########################################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

        with:
          fetch-depth: 0

      ##########################################################################
      # Setup Node
      ##########################################################################

      - name: Setup Node.js
        uses: actions/setup-node@v4

        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      ##########################################################################
      # Install Root Dependencies
      ##########################################################################

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Backend Dependencies
        working-directory: community-savings-app-backend
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: community-savings-app-frontend
        run: npm ci

      ##########################################################################
      # npm audit
      ##########################################################################

      - name: Root npm audit
        continue-on-error: true
        run: |
          npm audit --audit-level=moderate

      - name: Backend npm audit
        continue-on-error: true
        working-directory: community-savings-app-backend
        run: |
          npm audit --audit-level=moderate

      - name: Frontend npm audit
        continue-on-error: true
        working-directory: community-savings-app-frontend
        run: |
          npm audit --audit-level=moderate

      ##########################################################################
      # Dependency Review
      ##########################################################################

      - name: Dependency Review

        if: github.event_name == 'pull_request'

        uses: actions/dependency-review-action@v4

      ##########################################################################
      # CodeQL Initialization
      ##########################################################################

      - name: Initialize CodeQL

        uses: github/codeql-action/init@v3

        with:
          languages: javascript

      ##########################################################################
      # CodeQL Autobuild
      ##########################################################################

      - name: CodeQL Autobuild

        uses: github/codeql-action/autobuild@v3

      ##########################################################################
      # CodeQL Analysis
      ##########################################################################

      - name: Analyze CodeQL

        uses: github/codeql-action/analyze@v3

      ##########################################################################
      # Install Trivy
      ##########################################################################

      - name: Install Trivy

        uses: aquasecurity/trivy-action@0.24.0

        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      ##########################################################################
      # SARIF Report
      ##########################################################################

      - name: Trivy SARIF Report

        uses: aquasecurity/trivy-action@0.24.0

        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF

        uses: github/codeql-action/upload-sarif@v3

        with:
          sarif_file: trivy-results.sarif

      ##########################################################################
      # Secret Scanning (Gitleaks)
      ##########################################################################

      - name: Scan Repository Secrets

        uses: gitleaks/gitleaks-action@v2

        continue-on-error: true

      ##########################################################################
      # CycloneDX SBOM
      ##########################################################################

      - name: Generate SBOM

        uses: CycloneDX/gh-node-module-generatebom@v1

        with:
          path: .

      ##########################################################################
      # Upload SBOM
      ##########################################################################

      - name: Upload SBOM

        uses: actions/upload-artifact@v4

        with:

          name: cyclone-sbom

          path: |
            **/bom.xml
            **/bom.json

          if-no-files-found: ignore

          retention-days: 30

      ##########################################################################
      # Upload Trivy Report
      ##########################################################################

      - name: Upload Trivy Reports

        uses: actions/upload-artifact@v4

        if: always()

        with:

          name: trivy-security-report

          path: |
            trivy-results.sarif

          if-no-files-found: ignore

      ##########################################################################
      # GitHub Summary
      ##########################################################################

      - name: Publish Security Summary

        if: always()

        run: |

          {
            echo "# 🔒 Security Stage"
            echo ""
            echo "| Check | Status |"
            echo "|------|--------|"
            echo "| npm audit | Completed |"
            echo "| Dependency Review | Completed |"
            echo "| CodeQL | Completed |"
            echo "| Trivy | Completed |"
            echo "| Secret Scan | Completed |"
            echo "| SBOM | Generated |"
            echo ""
            echo "Security scan finished successfully."
          } >> "$GITHUB_STEP_SUMMARY"

################################################################################
# BUILD STAGE
################################################################################

  build:

    name: Build & Package

    needs:
      - security

    runs-on: ubuntu-latest

    timeout-minutes: 45

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    strategy:

      fail-fast: false

      matrix:

        node-version:
          - "24.15.0"

    env:

      NODE_ENV: production

      CI: true

      REGISTRY: ghcr.io

      IMAGE_NAMESPACE: ${{ github.repository_owner }}

      BACKEND_IMAGE: community-savings-backend

      FRONTEND_IMAGE: community-savings-frontend

    steps:

################################################################################
# Checkout
################################################################################

      - name: Checkout Repository

        uses: actions/checkout@v4

        with:

          fetch-depth: 0

################################################################################
# Setup Node
################################################################################

      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: ${{ matrix.node-version }}

          cache: npm

          cache-dependency-path: |

            package-lock.json

            community-savings-app-backend/package-lock.json

            community-savings-app-frontend/package-lock.json

################################################################################
# Restore npm cache
################################################################################

      - name: Restore Dependency Cache

        uses: actions/cache@v4

        with:

          path: |

            ~/.npm

            community-savings-app-backend/node_modules

            community-savings-app-frontend/node_modules

          key: >

            build-${{ runner.os }}-

            ${{ matrix.node-version }}-

            ${{ hashFiles('**/package-lock.json') }}

          restore-keys: |

            build-${{ runner.os }}

################################################################################
# Install Backend
################################################################################

      - name: Install Backend Dependencies

        working-directory: community-savings-app-backend

        run: npm ci

################################################################################
# Install Frontend
################################################################################

      - name: Install Frontend Dependencies

        working-directory: community-savings-app-frontend

        run: npm ci

################################################################################
# Backend Build
################################################################################

      - name: Build Backend

        working-directory: community-savings-app-backend

        run: |

          if npm run | grep -q build

          then

            npm run build

          else

            echo "No backend build script found."

          fi

################################################################################
# Frontend Build
################################################################################

      - name: Build Frontend

        working-directory: community-savings-app-frontend

        run: npm run build

################################################################################
# Package Backend Artifact
################################################################################

      - name: Archive Backend

        run: |

          tar \

            --exclude=node_modules \

            -czf backend-build.tar.gz \

            community-savings-app-backend

################################################################################
# Package Frontend Artifact
################################################################################

      - name: Archive Frontend

        run: |

          tar \

            -czf frontend-build.tar.gz \

            community-savings-app-frontend/dist

################################################################################
# Upload Backend Artifact
################################################################################

      - name: Upload Backend Artifact

        uses: actions/upload-artifact@v4

        with:

          name: backend-build

          path: backend-build.tar.gz

          retention-days: 30

################################################################################
# Upload Frontend Artifact
################################################################################

      - name: Upload Frontend Artifact

        uses: actions/upload-artifact@v4

        with:

          name: frontend-build

          path: frontend-build.tar.gz

          retention-days: 30

################################################################################
# Docker Buildx
################################################################################

      - name: Setup Docker Buildx

        uses: docker/setup-buildx-action@v3

################################################################################
# Docker Cache
################################################################################

      - name: Docker Cache

        uses: actions/cache@v4

        with:

          path: /tmp/.buildx-cache

          key: >

            docker-${{ runner.os }}-${{ github.sha }}

          restore-keys: |

            docker-${{ runner.os }}

################################################################################
# Docker Metadata
################################################################################

      - name: Backend Docker Metadata

        id: backend-meta

        uses: docker/metadata-action@v5

        with:

          images: |

            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE }}

          tags: |

            type=sha

            type=ref,event=branch

            type=ref,event=tag

            type=raw,value=latest,enable={{is_default_branch}}

          labels: |

            org.opencontainers.image.title=TITech Backend

            org.opencontainers.image.vendor=TITech Community Capital

            org.opencontainers.image.source=${{ github.repository }}

            org.opencontainers.image.version=${{ github.ref_name }}

################################################################################
# Frontend Docker Metadata
################################################################################

      - name: Frontend Docker Metadata

        id: frontend-meta

        uses: docker/metadata-action@v5

        with:

          images: |

            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}

          tags: |

            type=sha

            type=ref,event=branch

            type=ref,event=tag

            type=raw,value=latest,enable={{is_default_branch}}

################################################################################
# Backend Docker Build
################################################################################

      - name: Build Backend Image

        uses: docker/build-push-action@v6

        with:

          context: ./community-savings-app-backend

          push: false

          load: false

          provenance: true

          sbom: true

          tags: ${{ steps.backend-meta.outputs.tags }}

          labels: ${{ steps.backend-meta.outputs.labels }}

          cache-from: type=gha

          cache-to: type=gha,mode=max

################################################################################
# Frontend Docker Build
################################################################################

      - name: Build Frontend Image

        uses: docker/build-push-action@v6

        with:

          context: ./community-savings-app-frontend

          push: false

          load: false

          provenance: true

          sbom: true

          tags: ${{ steps.frontend-meta.outputs.tags }}

          labels: ${{ steps.frontend-meta.outputs.labels }}

          cache-from: type=gha

          cache-to: type=gha,mode=max

################################################################################
# Build Summary
################################################################################

      - name: Publish Build Summary

        if: always()

        run: |

          {

            echo "# 🏗 Build Stage"

            echo ""

            echo "| Component | Status |"

            echo "|-----------|--------|"

            echo "| Backend Build | ✅ |"

            echo "| Frontend Build | ✅ |"

            echo "| Artifacts | Uploaded |"

            echo "| Docker Buildx | Completed |"

            echo "| OCI Metadata | Generated |"

            echo "| Build Cache | Enabled |"

          } >> "$GITHUB_STEP_SUMMARY"
################################################################################
# CONTAINER PUBLISHING
################################################################################

  publish-images:

    name: Publish Container Images

    needs:
      - build

    runs-on: ubuntu-latest

    timeout-minutes: 45

    permissions:

      contents: read

      packages: write

      id-token: write

      attestations: write

      security-events: write

    env:

      REGISTRY: ghcr.io

      IMAGE_NAMESPACE: ${{ github.repository_owner }}

      BACKEND_IMAGE: community-savings-backend

      FRONTEND_IMAGE: community-savings-frontend

    steps:

################################################################################
# Checkout
################################################################################

      - name: Checkout Repository

        uses: actions/checkout@v4

################################################################################
# Docker Buildx
################################################################################

      - name: Setup Docker Buildx

        uses: docker/setup-buildx-action@v3

################################################################################
# Enable QEMU
################################################################################

      - name: Enable Multi-Architecture

        uses: docker/setup-qemu-action@v3

################################################################################
# Login GHCR
################################################################################

      - name: Login to GitHub Container Registry

        uses: docker/login-action@v3

        with:

          registry: ghcr.io

          username: ${{ github.actor }}

          password: ${{ secrets.GITHUB_TOKEN }}

################################################################################
# Docker Metadata Backend
################################################################################

      - name: Backend Metadata

        id: backend-meta

        uses: docker/metadata-action@v5

        with:

          images: |

            ghcr.io/${{ github.repository_owner }}/community-savings-backend

          tags: |

            type=sha

            type=ref,event=branch

            type=ref,event=tag

            type=raw,value=latest,enable={{is_default_branch}}

################################################################################
# Docker Metadata Frontend
################################################################################

      - name: Frontend Metadata

        id: frontend-meta

        uses: docker/metadata-action@v5

        with:

          images: |

            ghcr.io/${{ github.repository_owner }}/community-savings-frontend

          tags: |

            type=sha

            type=ref,event=branch

            type=ref,event=tag

            type=raw,value=latest,enable={{is_default_branch}}

################################################################################
# Backend Multi-Architecture Build & Push
################################################################################

      - name: Publish Backend Image

        id: backend-image

        uses: docker/build-push-action@v6

        with:

          context: ./community-savings-app-backend

          push: true

          provenance: mode=max

          sbom: true

          platforms: |

            linux/amd64,
            linux/arm64

          tags: ${{ steps.backend-meta.outputs.tags }}

          labels: ${{ steps.backend-meta.outputs.labels }}

          cache-from: type=gha

          cache-to: type=gha,mode=max

################################################################################
# Frontend Multi-Architecture Build & Push
################################################################################

      - name: Publish Frontend Image

        id: frontend-image

        uses: docker/build-push-action@v6

        with:

          context: ./community-savings-app-frontend

          push: true

          provenance: mode=max

          sbom: true

          platforms: |

            linux/amd64,
            linux/arm64

          tags: ${{ steps.frontend-meta.outputs.tags }}

          labels: ${{ steps.frontend-meta.outputs.labels }}

          cache-from: type=gha

          cache-to: type=gha,mode=max

################################################################################
# Install Cosign
################################################################################

      - name: Install Cosign

        uses: sigstore/cosign-installer@v3

################################################################################
# Verify Cosign
################################################################################

      - name: Verify Cosign

        run: cosign version

################################################################################
# Sign Backend Image
################################################################################

      - name: Sign Backend Image

        env:

          COSIGN_EXPERIMENTAL: "true"

        run: |

          cosign sign --yes \
          ghcr.io/${{ github.repository_owner }}/community-savings-backend@${{ steps.backend-image.outputs.digest }}

################################################################################
# Sign Frontend Image
################################################################################

      - name: Sign Frontend Image

        env:

          COSIGN_EXPERIMENTAL: "true"

        run: |

          cosign sign --yes \
          ghcr.io/${{ github.repository_owner }}/community-savings-frontend@${{ steps.frontend-image.outputs.digest }}

################################################################################
# Generate Build Provenance
################################################################################

      - name: Generate SLSA Provenance

        uses: actions/attest-build-provenance@v2

        with:

          subject-name: |
            ghcr.io/${{ github.repository_owner }}/community-savings-backend

          subject-digest: ${{ steps.backend-image.outputs.digest }}

          push-to-registry: true

################################################################################
# Generate Frontend Provenance
################################################################################

      - name: Generate Frontend Provenance

        uses: actions/attest-build-provenance@v2

        with:

          subject-name: |
            ghcr.io/${{ github.repository_owner }}/community-savings-frontend

          subject-digest: ${{ steps.frontend-image.outputs.digest }}

          push-to-registry: true

################################################################################
# Publish Summary
################################################################################

      - name: Publish Summary

        if: always()

        run: |

          {

            echo "# 📦 Container Publishing"

            echo ""

            echo "| Component | Status |"

            echo "|-----------|--------|"

            echo "| GHCR Login | ✅ |"

            echo "| Multi-Architecture | linux/amd64 + linux/arm64 |"

            echo "| Backend Push | ✅ |"

            echo "| Frontend Push | ✅ |"

            echo "| Provenance | Generated |"

            echo "| SBOM | Generated |"

            echo "| Cosign Signing | Completed |"

            echo "| Registry | GitHub Container Registry |"

          } >> "$GITHUB_STEP_SUMMARY"
################################################################################
# STAGING DEPLOYMENT
################################################################################

  deploy-staging:

    name: Deploy to Staging

    needs:
      - publish-images

    runs-on: ubuntu-latest

    timeout-minutes: 45

    environment:

      name: staging

      url: https://staging.communitycapital.titech.africa

    permissions:

      contents: read

      packages: read

      id-token: write

    env:

      KUBE_NAMESPACE: staging

      BACKEND_DEPLOYMENT: community-savings-backend

      FRONTEND_DEPLOYMENT: community-savings-frontend

      BACKEND_CONTAINER: backend

      FRONTEND_CONTAINER: frontend

      DATABASE_MIGRATION_TIMEOUT: 600

################################################################################
# Checkout
################################################################################

    steps:

      - name: Checkout Repository

        uses: actions/checkout@v4

################################################################################
# Install kubectl
################################################################################

      - name: Install kubectl

        uses: azure/setup-kubectl@v4

        with:

          version: latest

################################################################################
# Install Helm
################################################################################

      - name: Install Helm

        uses: azure/setup-helm@v4

################################################################################
# Configure Kubernetes Credentials
################################################################################

      - name: Configure Kubernetes

        uses: azure/k8s-set-context@v4

        with:

          method: kubeconfig

          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

################################################################################
# Verify Cluster Access
################################################################################

      - name: Verify Cluster

        run: |

          kubectl cluster-info

          kubectl get nodes

          kubectl get namespaces

################################################################################
# Ensure Namespace Exists
################################################################################

      - name: Create Namespace

        run: |

          kubectl get namespace ${KUBE_NAMESPACE} || \
          kubectl create namespace ${KUBE_NAMESPACE}

################################################################################
# Database Migration
################################################################################

      - name: Run Database Migrations

        env:

          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

          NODE_ENV: production

        run: |

          echo "Running migrations..."

          cd community-savings-app-backend

          if npm run | grep -q migrate

          then

            timeout ${DATABASE_MIGRATION_TIMEOUT} npm run migrate

          else

            echo "Migration script not found."

          fi

################################################################################
# Deploy Backend
################################################################################

      - name: Deploy Backend

        run: |

          helm upgrade \

            --install \

            backend \

            ./deployment/charts/backend \

            --namespace ${KUBE_NAMESPACE} \

            --set image.repository=ghcr.io/${{ github.repository_owner }}/community-savings-backend \

            --set image.tag=${{ github.sha }} \

            --wait \

            --timeout=15m

################################################################################
# Deploy Frontend
################################################################################

      - name: Deploy Frontend

        run: |

          helm upgrade \

            --install \

            frontend \

            ./deployment/charts/frontend \

            --namespace ${KUBE_NAMESPACE} \

            --set image.repository=ghcr.io/${{ github.repository_owner }}/community-savings-frontend \

            --set image.tag=${{ github.sha }} \

            --wait \

            --timeout=15m

################################################################################
# Verify Rollout
################################################################################

      - name: Verify Backend Rollout

        run: |

          kubectl rollout status deployment/${BACKEND_DEPLOYMENT} \
          -n ${KUBE_NAMESPACE} \
          --timeout=10m

################################################################################
# Verify Frontend Rollout
################################################################################

      - name: Verify Frontend Rollout

        run: |

          kubectl rollout status deployment/${FRONTEND_DEPLOYMENT} \
          -n ${KUBE_NAMESPACE} \
          --timeout=10m

################################################################################
# Wait For Pods
################################################################################

      - name: Verify Pods

        run: |

          kubectl get pods -n ${KUBE_NAMESPACE}

################################################################################
# Backend Health Check
################################################################################

      - name: Backend Health Check

        run: |

          kubectl wait \

            --namespace ${KUBE_NAMESPACE} \

            --for=condition=Ready \

            pod \

            --all \

            --timeout=300s

################################################################################
# HTTP Health Check
################################################################################

      - name: Verify API

        run: |

          for i in {1..30}; do

            if curl -fsS \
              https://staging-api.communitycapital.titech.africa/health

            then

              echo "Backend healthy."

              exit 0

            fi

            sleep 10

          done

          exit 1

################################################################################
# Rollback on Failure
################################################################################

      - name: Automatic Rollback

        if: failure()

        run: |

          helm rollback backend 0 \
            --namespace ${KUBE_NAMESPACE} || true

          helm rollback frontend 0 \
            --namespace ${KUBE_NAMESPACE} || true

################################################################################
# Deployment Summary
################################################################################

      - name: Deployment Summary

        if: always()

        run: |

          {

            echo "# 🚀 Staging Deployment"

            echo ""

            echo "| Item | Status |"

            echo "|------|--------|"

            echo "| Kubernetes | Connected |"

            echo "| Namespace | ${KUBE_NAMESPACE} |"

            echo "| Database Migration | Completed |"

            echo "| Backend Rollout | Completed |"

            echo "| Frontend Rollout | Completed |"

            echo "| Health Checks | Passed |"

            echo "| Rollback | Automatic |"

          } >> "$GITHUB_STEP_SUMMARY"
################################################################################
# PRODUCTION DEPLOYMENT
################################################################################

  deploy-production:

    name: Production Deployment

    needs:

      - deploy-staging

    runs-on: ubuntu-latest

    timeout-minutes: 60

    environment:

      name: production

      url: https://communitycapital.titech.africa

    concurrency:

      group: production-deployment

      cancel-in-progress: false

    permissions:

      contents: write

      deployments: write

      packages: read

      id-token: write

    env:

      KUBE_NAMESPACE: production

      BACKEND_RELEASE: backend

      FRONTEND_RELEASE: frontend

      BACKEND_DEPLOYMENT: community-savings-backend

      FRONTEND_DEPLOYMENT: community-savings-frontend

################################################################################
# Checkout
################################################################################

    steps:

      - name: Checkout Repository

        uses: actions/checkout@v4

################################################################################
# Install kubectl
################################################################################

      - name: Install kubectl

        uses: azure/setup-kubectl@v4

################################################################################
# Install Helm
################################################################################

      - name: Install Helm

        uses: azure/setup-helm@v4

################################################################################
# Configure Kubernetes
################################################################################

      - name: Configure Kubernetes

        uses: azure/k8s-set-context@v4

        with:

          method: kubeconfig

          kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

################################################################################
# Verify Cluster
################################################################################

      - name: Verify Cluster

        run: |

          kubectl cluster-info

          kubectl get nodes

################################################################################
# Production Database Migration
################################################################################

      - name: Execute Database Migrations

        env:

          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

        run: |

          cd community-savings-app-backend

          if npm run | grep -q migrate

          then
            npm run migrate
          else
            echo "No migration script detected."
          fi

################################################################################
# Deploy Backend (Rolling Update)
################################################################################

      - name: Deploy Backend

        run: |

          helm upgrade \
            --install \
            ${BACKEND_RELEASE} \
            ./deployment/charts/backend \
            --namespace ${KUBE_NAMESPACE} \
            --set image.repository=ghcr.io/${{ github.repository_owner }}/community-savings-backend \
            --set image.tag=${{ github.sha }} \
            --set deployment.strategy=RollingUpdate \
            --set deployment.maxUnavailable=0 \
            --set deployment.maxSurge=1 \
            --wait \
            --timeout=20m

################################################################################
# Deploy Frontend
################################################################################

      - name: Deploy Frontend

        run: |

          helm upgrade \
            --install \
            ${FRONTEND_RELEASE} \
            ./deployment/charts/frontend \
            --namespace ${KUBE_NAMESPACE} \
            --set image.repository=ghcr.io/${{ github.repository_owner }}/community-savings-frontend \
            --set image.tag=${{ github.sha }} \
            --set deployment.strategy=RollingUpdate \
            --set deployment.maxUnavailable=0 \
            --set deployment.maxSurge=1 \
            --wait \
            --timeout=20m

################################################################################
# Verify Backend Rollout
################################################################################

      - name: Verify Backend Rollout

        run: |

          kubectl rollout status \
            deployment/${BACKEND_DEPLOYMENT} \
            -n ${KUBE_NAMESPACE} \
            --timeout=15m

################################################################################
# Verify Frontend Rollout
################################################################################

      - name: Verify Frontend Rollout

        run: |

          kubectl rollout status \
            deployment/${FRONTEND_DEPLOYMENT} \
            -n ${KUBE_NAMESPACE} \
            --timeout=15m

################################################################################
# Production Health Checks
################################################################################

      - name: Production Health Check

        run: |

          for i in {1..30}; do

            if curl -fsS https://api.communitycapital.titech.africa/health
            then
              echo "Production API healthy."
              exit 0
            fi

            sleep 10

          done

          exit 1

################################################################################
# Automatic Rollback
################################################################################

      - name: Rollback Deployment

        if: failure()

        run: |

          helm rollback ${BACKEND_RELEASE} \
            --namespace ${KUBE_NAMESPACE} || true

          helm rollback ${FRONTEND_RELEASE} \
            --namespace ${KUBE_NAMESPACE} || true

################################################################################
# Create GitHub Release
################################################################################

      - name: Create GitHub Release

        if: success()

        uses: softprops/action-gh-release@v2

        with:

          generate_release_notes: true

          tag_name: production-${{ github.run_number }}

          name: Production Release ${{ github.run_number }}

          target_commitish: ${{ github.sha }}

################################################################################
# Create Deployment Record
################################################################################

      - name: Create GitHub Deployment

        uses: bobheadxi/deployments@v1

        with:

          step: finish

          env: production

          status: success

          env_url: https://communitycapital.titech.africa

################################################################################
# Deployment Summary
################################################################################

      - name: Publish Deployment Summary

        if: always()

        run: |

          {

            echo "# 🚀 Production Deployment"

            echo ""

            echo "| Component | Status |"

            echo "|-----------|--------|"

            echo "| Protected Environment | ✅ |"

            echo "| Manual Approval | GitHub Environment |"

            echo "| Rolling Update | Enabled |"

            echo "| Zero Downtime | Enabled |"

            echo "| Database Migration | Completed |"

            echo "| Rollout Verification | Completed |"

            echo "| Health Checks | Passed |"

            echo "| Rollback | Automatic |"

            echo "| GitHub Release | Created |"

            echo "| Deployment Record | Created |"

            echo "| Commit | ${{ github.sha }} |"

            echo "| Run | ${{ github.run_number }} |"

          } >> "$GITHUB_STEP_SUMMARY"
################################################################################
# POST DEPLOYMENT VERIFICATION
################################################################################

  post-deployment:

    name: Post Deployment Verification

    needs:

      - deploy-production

    runs-on: ubuntu-latest

    timeout-minutes: 30

    if: always()

    permissions:

      contents: read

      actions: read

      deployments: read

################################################################################
# Environment
################################################################################

    env:

      API_URL: https://api.communitycapital.titech.africa

      WEB_URL: https://communitycapital.titech.africa

      KUBE_NAMESPACE: production

################################################################################
# Checkout
################################################################################

    steps:

      - name: Checkout Repository

        uses: actions/checkout@v4

################################################################################
# Install kubectl
################################################################################

      - name: Install kubectl

        uses: azure/setup-kubectl@v4

################################################################################
# Configure Kubernetes
################################################################################

      - name: Configure Kubernetes

        uses: azure/k8s-set-context@v4

        with:

          method: kubeconfig

          kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

################################################################################
# API Smoke Tests
################################################################################

      - name: API Smoke Test

        run: |

          echo "Running API smoke tests..."

          curl --fail --retry 5 \
               --retry-delay 5 \
               ${API_URL}/health

          curl --fail \
               ${API_URL}/version

################################################################################
# Frontend Smoke Test
################################################################################

      - name: Frontend Smoke Test

        run: |

          echo "Checking frontend..."

          curl --fail \
               ${WEB_URL}

################################################################################
# Kubernetes Health
################################################################################

      - name: Verify Cluster Health

        run: |

          kubectl get pods -n ${KUBE_NAMESPACE}

          kubectl get deployments -n ${KUBE_NAMESPACE}

          kubectl get services -n ${KUBE_NAMESPACE}

################################################################################
# Rollout Verification
################################################################################

      - name: Verify Rollout Status

        run: |

          kubectl rollout status deployment/community-savings-backend \
            -n ${KUBE_NAMESPACE}

          kubectl rollout status deployment/community-savings-frontend \
            -n ${KUBE_NAMESPACE}

################################################################################
# Monitoring Verification
################################################################################

      - name: Monitoring Check

        continue-on-error: true

        run: |

          echo "Checking monitoring endpoints..."

          curl -fsS https://prometheus.communitycapital.titech.africa/-/healthy || true

          curl -fsS https://grafana.communitycapital.titech.africa/api/health || true

################################################################################
# Deployment Metrics
################################################################################

      - name: Deployment Metrics

        run: |

          echo "Deployment Timestamp: $(date -u)"

          echo "Commit: ${{ github.sha }}"

          echo "Actor: ${{ github.actor }}"

          echo "Run: ${{ github.run_number }}"

################################################################################
# Slack Notification
################################################################################

      - name: Notify Slack

        if: success() && secrets.SLACK_WEBHOOK_URL != ''

        uses: slackapi/slack-github-action@v1.27.0

        with:

          payload: |

            {

              "text":"✅ Production deployment successful

              Repository: ${{ github.repository }}

              Run: ${{ github.run_number }}

              Commit: ${{ github.sha }}

              Environment: Production"

            }

        env:

          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

################################################################################
# Microsoft Teams Notification
################################################################################

      - name: Notify Teams

        if: success() && secrets.TEAMS_WEBHOOK_URL != ''

        uses: skitionek/notify-microsoft-teams@v1

        with:

          webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}

          overwrite: |

            {

              "@type":"MessageCard",

              "@context":"https://schema.org/extensions",

              "summary":"Production Deployment",

              "themeColor":"00AA00",

              "title":"Deployment Successful",

              "text":"Community Savings Platform has been deployed successfully."

            }

################################################################################
# Failure Diagnostics
################################################################################

      - name: Collect Diagnostics

        if: failure()

        run: |

          kubectl get pods -A

          kubectl describe pods -A

          kubectl get events -A --sort-by=.lastTimestamp

################################################################################
# Cleanup
################################################################################

      - name: Cleanup Workspace

        if: always()

        run: |

          docker image prune -af || true

          docker builder prune -af || true

          npm cache clean --force || true

################################################################################
# GitHub Deployment Summary
################################################################################

      - name: Publish Summary

        if: always()

        run: |

          {

            echo "# 🚀 Production Deployment Summary"

            echo ""

            echo "## Deployment"

            echo ""

            echo "| Item | Status |"

            echo "|------|--------|"

            echo "| Smoke Tests | Completed |"

            echo "| Kubernetes Health | Verified |"

            echo "| Rollout | Successful |"

            echo "| Monitoring | Verified |"

            echo "| Notifications | Sent |"

            echo "| Cleanup | Completed |"

            echo ""

            echo "## Build Information"

            echo ""

            echo "| Property | Value |"

            echo "|----------|-------|"

            echo "| Repository | ${{ github.repository }} |"

            echo "| Commit | ${{ github.sha }} |"

            echo "| Branch | ${{ github.ref_name }} |"

            echo "| Run | ${{ github.run_number }} |"

            echo "| Triggered By | ${{ github.actor }} |"

            echo "| Workflow | ${{ github.workflow }} |"

            echo "| Timestamp | $(date -u) UTC |"

            echo ""

            echo "## Endpoints"

            echo ""

            echo "- API: ${API_URL}"

            echo "- Frontend: ${WEB_URL}"

          } >> "$GITHUB_STEP_SUMMARY"