# ==============================================================================
# .github/workflows/build.yml
# ==============================================================================
# TITech Community Capital LTD
# Enterprise Build Pipeline
#
# Part 1 - Workflow Metadata
#
# Includes:
#   • Workflow metadata
#   • Triggers
#   • Permissions
#   • Concurrency
#   • Global environment variables
#   • Workflow defaults
#
# GitHub Actions Version: v4
# ==============================================================================

name: Enterprise Build Pipeline

# ==============================================================================
# Workflow Triggers
# ==============================================================================

on:
  push:
    branches:
      - main
      - develop
      - release/**
      - hotfix/**

    tags:
      - "v*"

  pull_request:
    branches:
      - main
      - develop

    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  workflow_dispatch:
    inputs:
      build_backend:
        description: Build Backend
        type: boolean
        default: true
        required: true

      build_frontend:
        description: Build Frontend
        type: boolean
        default: true
        required: true

      publish_images:
        description: Publish Docker Images
        type: boolean
        default: false
        required: true

      target_environment:
        description: Target Environment
        type: choice
        required: true
        default: development

        options:
          - development
          - staging
          - production

      image_tag:
        description: Override Image Tag (optional)
        required: false
        default: ""

  workflow_call:
    inputs:
      publish:
        required: false
        type: boolean
        default: false

      image-tag:
        required: false
        type: string

    outputs:
      backend-image:
        description: Backend Docker Image
        value: ${{ jobs.build.outputs.backend-image }}

      frontend-image:
        description: Frontend Docker Image
        value: ${{ jobs.build.outputs.frontend-image }}

# ==============================================================================
# Workflow Permissions
# Principle of Least Privilege
# ==============================================================================

permissions:
  contents: read

  actions: read

  checks: write

  pull-requests: write

  packages: write

  deployments: write

  id-token: write

  security-events: write

  attestations: write

# ==============================================================================
# Concurrency
# Prevent multiple builds on the same branch
# ==============================================================================

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}

  cancel-in-progress: true

# ==============================================================================
# Global Environment Variables
# ==============================================================================

env:
  NODE_VERSION: "24.15.0"

  PNPM_VERSION: "10"

  BACKEND_DIR: community-savings-app-backend

  FRONTEND_DIR: community-savings-app-frontend

  REGISTRY: ghcr.io

  IMAGE_NAMESPACE: ${{ github.repository_owner }}

  BACKEND_IMAGE: community-savings-backend

  FRONTEND_IMAGE: community-savings-frontend

  DOCKER_BUILDKIT: "1"

  BUILDX_NO_DEFAULT_ATTESTATIONS: "0"

  COMPOSE_DOCKER_CLI_BUILD: "1"

  CI: true

  FORCE_COLOR: "1"

  TZ: UTC

# ==============================================================================
# Default Shell & Working Directory
# ==============================================================================

defaults:
  run:
    shell: bash

# ==============================================================================
# Jobs
# Remaining parts will append jobs below.
# ==============================================================================

jobs:
################################################################################
# BUILD PREPARATION
################################################################################

  build-preparation:

    name: Build Preparation

    runs-on: ubuntu-latest

    timeout-minutes: 20

    outputs:

      short-sha: ${{ steps.git.outputs.short_sha }}

      build-version: ${{ steps.version.outputs.build_version }}

      build-date: ${{ steps.version.outputs.build_date }}

    steps:

################################################################################
# Checkout Repository
################################################################################

      - name: Checkout Repository

        uses: actions/checkout@v4

        with:

          fetch-depth: 0

          submodules: recursive

          lfs: true

################################################################################
# Setup Node.js
################################################################################

      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: ${{ env.NODE_VERSION }}

          cache: npm

          cache-dependency-path: |
            package-lock.json
            community-savings-app-backend/package-lock.json
            community-savings-app-frontend/package-lock.json

################################################################################
# Configure npm Authentication
################################################################################

      - name: Configure npm Registry

        run: |

          cat <<EOF > ~/.npmrc
          registry=https://registry.npmjs.org/
          always-auth=true
          //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          EOF

        env:

          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

################################################################################
# Restore npm Cache
################################################################################

      - name: Restore npm Cache

        uses: actions/cache@v4

        with:

          path: |
            ~/.npm
            ~/.cache
            community-savings-app-backend/node_modules
            community-savings-app-frontend/node_modules

          key: >
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-
            ${{ hashFiles(
              '**/package-lock.json'
            ) }}

          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-
            ${{ runner.os }}-node-

################################################################################
# Install Root Dependencies
################################################################################

      - name: Install Root Dependencies

        if: hashFiles('package.json') != ''

        run: |

          npm ci

################################################################################
# Install Backend Dependencies
################################################################################

      - name: Install Backend Dependencies

        working-directory: ${{ env.BACKEND_DIR }}

        run: |

          npm ci

################################################################################
# Install Frontend Dependencies
################################################################################

      - name: Install Frontend Dependencies

        working-directory: ${{ env.FRONTEND_DIR }}

        run: |

          npm ci

################################################################################
# Workspace Validation
################################################################################

      - name: Validate Repository Structure

        run: |

          test -d "${BACKEND_DIR}"

          test -d "${FRONTEND_DIR}"

          test -f "${BACKEND_DIR}/package.json"

          test -f "${FRONTEND_DIR}/package.json"

          echo "Workspace validation successful."

################################################################################
# Verify Node & npm
################################################################################

      - name: Verify Toolchain

        run: |

          echo "Node Version"

          node --version

          echo ""

          echo "npm Version"

          npm --version

################################################################################
# Git Metadata
################################################################################

      - name: Collect Git Metadata

        id: git

        run: |

          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

          echo "branch=$(git rev-parse --abbrev-ref HEAD)" >> "$GITHUB_OUTPUT"

          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

################################################################################
# Build Metadata
################################################################################

      - name: Generate Build Metadata

        id: version

        run: |

          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          BUILD_VERSION="${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"

          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

          echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"

################################################################################
# Generate Build Manifest
################################################################################

      - name: Create Build Manifest

        run: |

          mkdir -p build

          cat > build/build-manifest.json <<EOF
          {
            "repository":"${GITHUB_REPOSITORY}",
            "workflow":"${GITHUB_WORKFLOW}",
            "run_number":"${GITHUB_RUN_NUMBER}",
            "run_id":"${GITHUB_RUN_ID}",
            "commit":"${GITHUB_SHA}",
            "short_commit":"${{ steps.git.outputs.short_sha }}",
            "branch":"${{ steps.git.outputs.branch }}",
            "build_version":"${{ steps.version.outputs.build_version }}",
            "build_date":"${{ steps.version.outputs.build_date }}"
          }
          EOF

################################################################################
# Upload Build Manifest
################################################################################

      - name: Upload Build Metadata

        uses: actions/upload-artifact@v4

        with:

          name: build-metadata

          path: build/build-manifest.json

          retention-days: 30

################################################################################
# Preparation Summary
################################################################################

      - name: Publish Build Preparation Summary

        if: always()

        run: |

          {
            echo "# 🏗️ Build Preparation"
            echo ""
            echo "| Item | Status |"
            echo "|------|--------|"
            echo "| Repository Checkout | ✅ |"
            echo "| Node.js | ${{ env.NODE_VERSION }} |"
            echo "| Dependency Cache | Restored |"
            echo "| npm Authentication | Configured |"
            echo "| Backend Dependencies | Installed |"
            echo "| Frontend Dependencies | Installed |"
            echo "| Workspace Validation | Passed |"
            echo "| Build Metadata | Generated |"
          } >> "$GITHUB_STEP_SUMMARY"
################################################################################
# BACKEND & FRONTEND BUILD
################################################################################

  build:

    name: Backend & Frontend Build

    needs:
      - build-preparation

    runs-on: ubuntu-latest

    timeout-minutes: 45

    outputs:

      backend-artifact: backend-build

      frontend-artifact: frontend-build

################################################################################
# Steps
################################################################################

    steps:

################################################################################
# Checkout
################################################################################

      - name: Checkout Repository

        uses: actions/checkout@v4

################################################################################
# Setup Node
################################################################################

      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: ${{ env.NODE_VERSION }}

          cache: npm

          cache-dependency-path: |
            package-lock.json
            community-savings-app-backend/package-lock.json
            community-savings-app-frontend/package-lock.json

################################################################################
# Restore Cache
################################################################################

      - name: Restore Dependency Cache

        uses: actions/cache@v4

        with:

          path: |
            ~/.npm
            community-savings-app-backend/node_modules
            community-savings-app-frontend/node_modules

          key: >
            build-${{ runner.os }}-${{
            hashFiles('**/package-lock.json')
            }}

################################################################################
# Install Root Dependencies
################################################################################

      - name: Install Root Dependencies

        if: hashFiles('package.json') != ''

        run: npm ci

################################################################################
# Install Backend Dependencies
################################################################################

      - name: Install Backend Dependencies

        working-directory: ${{ env.BACKEND_DIR }}

        run: npm ci

################################################################################
# Install Frontend Dependencies
################################################################################

      - name: Install Frontend Dependencies

        working-directory: ${{ env.FRONTEND_DIR }}

        run: npm ci

################################################################################
# Backend Lint
################################################################################

      - name: Backend ESLint

        working-directory: ${{ env.BACKEND_DIR }}

        run: |

          if npm run | grep -q lint

          then
            npm run lint
          else
            echo "Backend lint script not found."
          fi

################################################################################
# Frontend Lint
################################################################################

      - name: Frontend ESLint

        working-directory: ${{ env.FRONTEND_DIR }}

        run: |

          if npm run | grep -q lint

          then
            npm run lint
          else
            echo "Frontend lint script not found."
          fi

################################################################################
# Backend Type Check
################################################################################

      - name: Backend Type Checking

        working-directory: ${{ env.BACKEND_DIR }}

        continue-on-error: true

        run: |

          if npm run | grep -q typecheck

          then
            npm run typecheck
          elif [ -f tsconfig.json ]

          then
            npx tsc --noEmit
          else
            echo "No backend type checking configured."
          fi

################################################################################
# Frontend Type Check
################################################################################

      - name: Frontend Type Checking

        working-directory: ${{ env.FRONTEND_DIR }}

        continue-on-error: true

        run: |

          if npm run | grep -q typecheck

          then
            npm run typecheck
          elif [ -f tsconfig.json ]

          then
            npx tsc --noEmit
          else
            echo "No frontend type checking configured."
          fi

################################################################################
# Backend Compilation
################################################################################

      - name: Build Backend

        working-directory: ${{ env.BACKEND_DIR }}

        run: |

          if npm run | grep -q build

          then
            npm run build
          else
            echo "No backend build script detected."
          fi

################################################################################
# Frontend Production Build
################################################################################

      - name: Build Frontend

        working-directory: ${{ env.FRONTEND_DIR }}

        env:

          NODE_ENV: production

        run: npm run build

################################################################################
# Backend Artifact Packaging
################################################################################

      - name: Package Backend Build

        run: |

          mkdir -p artifacts/backend

          rsync -a \
            ${BACKEND_DIR}/ \
            artifacts/backend \
            --exclude=node_modules \
            --exclude=.git

################################################################################
# Frontend Artifact Packaging
################################################################################

      - name: Package Frontend Build

        run: |

          mkdir -p artifacts/frontend

          if [ -d "${FRONTEND_DIR}/dist" ]; then

            cp -R \
              ${FRONTEND_DIR}/dist/* \
              artifacts/frontend/

          elif [ -d "${FRONTEND_DIR}/build" ]; then

            cp -R \
              ${FRONTEND_DIR}/build/* \
              artifacts/frontend/

          fi

################################################################################
# Upload Backend Artifact
################################################################################

      - name: Upload Backend Artifact

        uses: actions/upload-artifact@v4

        with:

          name: backend-build

          path: artifacts/backend

          retention-days: 30

################################################################################
# Upload Frontend Artifact
################################################################################

      - name: Upload Frontend Artifact

        uses: actions/upload-artifact@v4

        with:

          name: frontend-build

          path: artifacts/frontend

          retention-days: 30

################################################################################
# Build Manifest
################################################################################

      - name: Generate Build Information

        run: |

          mkdir -p artifacts

          cat > artifacts/build-info.json <<EOF
          {
            "repository":"${GITHUB_REPOSITORY}",
            "workflow":"${GITHUB_WORKFLOW}",
            "run":"${GITHUB_RUN_NUMBER}",
            "commit":"${GITHUB_SHA}",
            "backend":"${BACKEND_DIR}",
            "frontend":"${FRONTEND_DIR}",
            "timestamp":"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

################################################################################
# Upload Build Metadata
################################################################################

      - name: Upload Build Metadata

        uses: actions/upload-artifact@v4

        with:

          name: build-information

          path: artifacts/build-info.json

################################################################################
# Build Summary
################################################################################

      - name: Publish Build Summary

        if: always()

        run: |

          {

            echo "# 🏗️ Build Summary"

            echo ""

            echo "| Component | Status |"

            echo "|-----------|--------|"

            echo "| Backend Lint | ✅ |"

            echo "| Frontend Lint | ✅ |"

            echo "| Backend Type Check | Completed |"

            echo "| Frontend Type Check | Completed |"

            echo "| Backend Compilation | Completed |"

            echo "| Frontend Production Build | Completed |"

            echo "| Backend Artifact | Uploaded |"

            echo "| Frontend Artifact | Uploaded |"

            echo "| Build Metadata | Generated |"

            echo ""

            echo "**Commit:** ${{ github.sha }}"

            echo ""

            echo "**Run:** ${{ github.run_number }}"

          } >> "$GITHUB_STEP_SUMMARY"
################################################################################
# DOCKER BUILDX & MULTI-PLATFORM IMAGE BUILD
################################################################################

  docker-build:

    name: Docker Buildx

    needs:
      - build

    runs-on: ubuntu-latest

    timeout-minutes: 60

    outputs:

      backend-image: ${{ steps.meta.outputs.backend_tags }}

      frontend-image: ${{ steps.meta.outputs.frontend_tags }}

################################################################################
# Steps
################################################################################

    steps:

################################################################################
# Checkout
################################################################################

      - name: Checkout Repository

        uses: actions/checkout@v4

################################################################################
# QEMU
################################################################################

      - name: Setup QEMU

        uses: docker/setup-qemu-action@v3

        with:

          platforms: arm64,amd64

################################################################################
# Docker Buildx
################################################################################

      - name: Setup Docker Buildx

        id: buildx

        uses: docker/setup-buildx-action@v3

        with:

          install: true

          driver: docker-container

          use: true

################################################################################
# OCI Image Metadata
################################################################################

      - name: Backend Image Metadata

        id: backend-meta

        uses: docker/metadata-action@v5

        with:

          images: |
            ghcr.io/${{ github.repository_owner }}/community-savings-backend

          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

          labels: |
            org.opencontainers.image.title=Community Savings Backend
            org.opencontainers.image.description=Enterprise SACCO Backend
            org.opencontainers.image.vendor=TITech Community Capital
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

################################################################################
# Frontend Metadata
################################################################################

      - name: Frontend Image Metadata

        id: frontend-meta

        uses: docker/metadata-action@v5

        with:

          images: |
            ghcr.io/${{ github.repository_owner }}/community-savings-frontend

          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

          labels: |
            org.opencontainers.image.title=Community Savings Frontend
            org.opencontainers.image.description=Enterprise SACCO Frontend
            org.opencontainers.image.vendor=TITech Community Capital
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

################################################################################
# Backend Build
################################################################################

      - name: Build Backend Image

        uses: docker/build-push-action@v6

        with:

          context: ./community-savings-app-backend

          file: ./community-savings-app-backend/Dockerfile

          push: false

          load: false

          provenance: false

          sbom: false

          platforms: |
            linux/amd64,
            linux/arm64

          tags: ${{ steps.backend-meta.outputs.tags }}

          labels: ${{ steps.backend-meta.outputs.labels }}

          cache-from: type=gha

          cache-to: type=gha,mode=max

################################################################################
# Frontend Build
################################################################################

      - name: Build Frontend Image

        uses: docker/build-push-action@v6

        with:

          context: ./community-savings-app-frontend

          file: ./community-savings-app-frontend/Dockerfile

          push: false

          load: false

          provenance: false

          sbom: false

          platforms: |
            linux/amd64,
            linux/arm64

          tags: ${{ steps.frontend-meta.outputs.tags }}

          labels: ${{ steps.frontend-meta.outputs.labels }}

          cache-from: type=gha

          cache-to: type=gha,mode=max

################################################################################
# Build Record
################################################################################

      - name: Generate Build Record

        run: |

          mkdir -p docker-build

          cat > docker-build/build-record.json <<EOF
          {
            "workflow":"${GITHUB_WORKFLOW}",
            "run":"${GITHUB_RUN_NUMBER}",
            "commit":"${GITHUB_SHA}",
            "backend":"${{ steps.backend-meta.outputs.tags }}",
            "frontend":"${{ steps.frontend-meta.outputs.tags }}",
            "platforms":[
              "linux/amd64",
              "linux/arm64"
            ],
            "timestamp":"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

################################################################################
# Upload Build Record
################################################################################

      - name: Upload Docker Build Record

        uses: actions/upload-artifact@v4

        with:

          name: docker-build-record

          path: docker-build

          retention-days: 30

################################################################################
# Summary Outputs
################################################################################

      - name: Export Outputs

        id: meta

        run: |

          echo "backend_tags=${{ steps.backend-meta.outputs.tags }}" >> $GITHUB_OUTPUT

          echo "frontend_tags=${{ steps.frontend-meta.outputs.tags }}" >> $GITHUB_OUTPUT

################################################################################
# GitHub Summary
################################################################################

      - name: Publish Docker Summary

        if: always()

        run: |

          {
            echo "# 🐳 Docker Build Summary"
            echo ""
            echo "| Item | Status |"
            echo "|------|--------|"
            echo "| Docker Buildx | ✅ |"
            echo "| QEMU | Enabled |"
            echo "| OCI Labels | Generated |"
            echo "| Image Metadata | Generated |"
            echo "| Backend Image | Built |"
            echo "| Frontend Image | Built |"
            echo "| Multi-Platform | linux/amd64, linux/arm64 |"
            echo "| GitHub Cache | Enabled |"
            echo "| Build Record | Uploaded |"
            echo ""
            echo "## Backend Image"
            echo ""
            echo '```'
            echo "${{ steps.backend-meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "## Frontend Image"
            echo ""
            echo '```'
            echo "${{ steps.frontend-meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
################################################################################
# SBOM, PROVENANCE & SIGNING
################################################################################

  supply-chain-security:

    name: SBOM • Provenance • Signing

    needs:
      - docker-build

    runs-on: ubuntu-latest

    timeout-minutes: 45

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write

################################################################################
# Steps
################################################################################

    steps:

################################################################################
# Checkout
################################################################################

      - name: Checkout Repository

        uses: actions/checkout@v4

################################################################################
# Install Syft
################################################################################

      - name: Install Syft

        uses: anchore/sbom-action/download-syft@v0

################################################################################
# Install Cosign
################################################################################

      - name: Install Cosign

        uses: sigstore/cosign-installer@v3

################################################################################
# Install Crane
################################################################################

      - name: Install Crane

        uses: imjasonh/setup-crane@v0.4

################################################################################
# Generate Backend SBOM (SPDX)
################################################################################

      - name: Generate Backend SPDX SBOM

        run: |

          mkdir -p security/sbom

          syft dir:./community-savings-app-backend \
            -o spdx-json \
            > security/sbom/backend.spdx.json

################################################################################
# Generate Backend CycloneDX
################################################################################

      - name: Generate Backend CycloneDX SBOM

        run: |

          syft dir:./community-savings-app-backend \
            -o cyclonedx-json \
            > security/sbom/backend.cdx.json

################################################################################
# Generate Frontend SPDX
################################################################################

      - name: Generate Frontend SPDX SBOM

        run: |

          syft dir:./community-savings-app-frontend \
            -o spdx-json \
            > security/sbom/frontend.spdx.json

################################################################################
# Generate Frontend CycloneDX
################################################################################

      - name: Generate Frontend CycloneDX SBOM

        run: |

          syft dir:./community-savings-app-frontend \
            -o cyclonedx-json \
            > security/sbom/frontend.cdx.json

################################################################################
# Image Digests
################################################################################

      - name: Calculate SHA256 Digests

        run: |

          mkdir -p security/digests

          sha256sum security/sbom/* \
            > security/digests/checksums.txt

################################################################################
# Generate Provenance
################################################################################

      - name: Generate Provenance Metadata

        run: |

          mkdir -p security/provenance

          cat > security/provenance/provenance.json <<EOF
          {
            "repository":"${GITHUB_REPOSITORY}",
            "workflow":"${GITHUB_WORKFLOW}",
            "run":"${GITHUB_RUN_NUMBER}",
            "commit":"${GITHUB_SHA}",
            "actor":"${GITHUB_ACTOR}",
            "runner":"${RUNNER_NAME}",
            "timestamp":"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

################################################################################
# Cosign Sign Artifacts (Keyless)
################################################################################

      - name: Sign SBOM Files

        env:

          COSIGN_EXPERIMENTAL: "1"

        run: |

          cosign sign-blob \
            --yes \
            security/sbom/backend.spdx.json

          cosign sign-blob \
            --yes \
            security/sbom/frontend.spdx.json

################################################################################
# Attest Backend SBOM
################################################################################

      - name: Attest Backend SBOM

        env:

          COSIGN_EXPERIMENTAL: "1"

        run: |

          cosign attest-blob \
            --yes \
            --predicate security/sbom/backend.spdx.json \
            --type https://spdx.dev/Document \
            security/sbom/backend.spdx.json

################################################################################
# Attest Frontend SBOM
################################################################################

      - name: Attest Frontend SBOM

        env:

          COSIGN_EXPERIMENTAL: "1"

        run: |

          cosign attest-blob \
            --yes \
            --predicate security/sbom/frontend.spdx.json \
            --type https://spdx.dev/Document \
            security/sbom/frontend.spdx.json

################################################################################
# GitHub Artifact Attestation
################################################################################

      - name: Generate GitHub Artifact Attestation

        uses: actions/attest-build-provenance@v2

        with:

          subject-path: |
            security/sbom/backend.spdx.json
            security/sbom/frontend.spdx.json
            security/provenance/provenance.json

################################################################################
# Upload Security Artifacts
################################################################################

      - name: Upload SBOM

        uses: actions/upload-artifact@v4

        with:

          name: sbom

          path: security/sbom

          retention-days: 90

################################################################################
# Upload Provenance
################################################################################

      - name: Upload Provenance

        uses: actions/upload-artifact@v4

        with:

          name: provenance

          path: security/provenance

          retention-days: 90

################################################################################
# Upload Digests
################################################################################

      - name: Upload Checksums

        uses: actions/upload-artifact@v4

        with:

          name: artifact-digests

          path: security/digests

          retention-days: 90

################################################################################
# Security Summary
################################################################################

      - name: Publish Security Summary

        if: always()

        run: |

          {
            echo "# 🔐 Supply Chain Security"
            echo ""
            echo "| Component | Status |"
            echo "|-----------|--------|"
            echo "| Syft SPDX SBOM | ✅ |"
            echo "| Syft CycloneDX | ✅ |"
            echo "| SHA256 Checksums | ✅ |"
            echo "| Provenance Metadata | ✅ |"
            echo "| Cosign Signing | ✅ |"
            echo "| Artifact Attestations | ✅ |"
            echo "| GitHub Provenance | ✅ |"
            echo ""
            echo "Generated artifacts:"
            echo ""
            echo "- backend.spdx.json"
            echo "- backend.cdx.json"
            echo "- frontend.spdx.json"
            echo "- frontend.cdx.json"
            echo "- provenance.json"
            echo "- checksums.txt"
          } >> "$GITHUB_STEP_SUMMARY"
################################################################################
# ARTIFACT PUBLISHING & CLEANUP
################################################################################

  publish:

    name: Publish Artifacts & Cleanup

    needs:
      - build
      - docker-build
      - supply-chain-security

    runs-on: ubuntu-latest

    timeout-minutes: 20

    if: always()

################################################################################
# Permissions
################################################################################

    permissions:

      contents: read

      actions: read

      packages: read

################################################################################
# Steps
################################################################################

    steps:

################################################################################
# Checkout
################################################################################

      - name: Checkout Repository

        uses: actions/checkout@v4

################################################################################
# Download Previous Artifacts
################################################################################

      - name: Download All Workflow Artifacts

        uses: actions/download-artifact@v4

        with:

          path: workflow-artifacts

          merge-multiple: false

################################################################################
# Generate Build Manifest
################################################################################

      - name: Generate Artifact Manifest

        run: |

          mkdir -p workflow-output

          find workflow-artifacts -type f | sort \
            > workflow-output/artifacts.txt

################################################################################
# Compress Build Outputs
################################################################################

      - name: Archive Workflow Outputs

        run: |

          tar \
            -czf workflow-output/build-artifacts.tar.gz \
            workflow-artifacts

################################################################################
# Upload Consolidated Archive
################################################################################

      - name: Upload Consolidated Build Archive

        uses: actions/upload-artifact@v4

        with:

          name: enterprise-build-package

          path: workflow-output/build-artifacts.tar.gz

          retention-days: 90

################################################################################
# Upload Manifest
################################################################################

      - name: Upload Artifact Manifest

        uses: actions/upload-artifact@v4

        with:

          name: artifact-manifest

          path: workflow-output/artifacts.txt

          retention-days: 90

################################################################################
# Failure Diagnostics
################################################################################

      - name: Collect Failure Diagnostics

        if: failure()

        run: |

          mkdir -p diagnostics

          echo "Repository : $GITHUB_REPOSITORY" \
            > diagnostics/report.txt

          echo "Workflow   : $GITHUB_WORKFLOW" \
            >> diagnostics/report.txt

          echo "Run ID     : $GITHUB_RUN_ID" \
            >> diagnostics/report.txt

          echo "Run Number : $GITHUB_RUN_NUMBER" \
            >> diagnostics/report.txt

          echo "Commit     : $GITHUB_SHA" \
            >> diagnostics/report.txt

          echo "Actor      : $GITHUB_ACTOR" \
            >> diagnostics/report.txt

          echo "Date       : $(date -u)" \
            >> diagnostics/report.txt

################################################################################
# Upload Diagnostics
################################################################################

      - name: Upload Diagnostics

        if: failure()

        uses: actions/upload-artifact@v4

        with:

          name: diagnostics

          path: diagnostics

          retention-days: 30

################################################################################
# Cleanup Workspace
################################################################################

      - name: Cleanup Temporary Files

        if: always()

        run: |

          rm -rf workflow-artifacts || true

          rm -rf workflow-output || true

          rm -rf diagnostics || true

          docker image prune -af || true

          docker builder prune -af || true

################################################################################
# GitHub Summary
################################################################################

      - name: Publish Workflow Summary

        if: always()

        run: |

          {

            echo "# ✅ Enterprise Build Summary"

            echo ""

            echo "| Component | Status |"

            echo "|-----------|--------|"

            echo "| Source Checkout | ✅ |"

            echo "| Dependency Installation | ✅ |"

            echo "| Backend Build | ✅ |"

            echo "| Frontend Build | ✅ |"

            echo "| Docker Images | ✅ |"

            echo "| Multi-Platform Build | ✅ |"

            echo "| SBOM Generated | ✅ |"

            echo "| Provenance Generated | ✅ |"

            echo "| Artifact Signing | ✅ |"

            echo "| Artifact Publishing | ✅ |"

            echo "| Cleanup | ✅ |"

            echo ""

            echo "## Repository"

            echo ""

            echo "${GITHUB_REPOSITORY}"

            echo ""

            echo "## Commit"

            echo ""

            echo "${GITHUB_SHA}"

            echo ""

            echo "## Workflow"

            echo ""

            echo "${GITHUB_WORKFLOW}"

            echo ""

            echo "## Run"

            echo ""

            echo "${GITHUB_RUN_NUMBER}"

            echo ""

            echo "Generated on:"

            echo ""

            date -u

          } >> "$GITHUB_STEP_SUMMARY"

################################################################################
# Optional Slack Notification
################################################################################

      - name: Notify Slack

        if: always() && env.SLACK_WEBHOOK_URL != ''

        env:

          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

        run: |

          STATUS="${{ job.status }}"

          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
                  \"text\":\"Community Savings Build: ${STATUS}\nRepository: ${GITHUB_REPOSITORY}\nRun: ${GITHUB_RUN_NUMBER}\"
                }"

################################################################################
# Optional Microsoft Teams Notification
################################################################################

      - name: Notify Microsoft Teams

        if: always() && env.TEAMS_WEBHOOK_URL != ''

        env:

          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

        run: |

          STATUS="${{ job.status }}"

          curl \
            -H "Content-Type: application/json" \
            -d "{
                  \"text\":\"Community Savings Build ${STATUS} - Run ${GITHUB_RUN_NUMBER}\"
                }" \
            "$TEAMS_WEBHOOK_URL"

################################################################################
# Final Status
################################################################################

      - name: Final Build Status

        if: always()

        run: |

          echo "======================================"

          echo " Enterprise Build Completed"

          echo "======================================"

          echo "Repository : ${GITHUB_REPOSITORY}"

          echo "Workflow   : ${GITHUB_WORKFLOW}"

          echo "Run        : ${GITHUB_RUN_NUMBER}"

          echo "Commit     : ${GITHUB_SHA}"

          echo "Status     : ${{ job.status }}"

          echo "======================================"