name: Enterprise Security Scan

on:
  push:
    branches:
      - main
      - develop
      - release/**
  pull_request:
    branches:
      - "**"
  schedule:
    # Every Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: production

################################################################################
# CodeQL Analysis
################################################################################

jobs:

  codeql:

    name: CodeQL Analysis

    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript

    steps:

      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

################################################################################
# Dependency Review
################################################################################

  dependency-review:

    if: github.event_name == 'pull_request'

    name: Dependency Review

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:

      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

################################################################################
# Frontend Security Audit
################################################################################

  frontend-audit:

    name: Frontend Security Audit

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: [20, 22]

    defaults:
      run:
        working-directory: community-savings-app-frontend

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: community-savings-app-frontend/package-lock.json

      - run: npm ci

      - name: npm Audit
        run: npm audit --audit-level=moderate

################################################################################
# Backend Security Audit
################################################################################

  backend-audit:

    name: Backend Security Audit

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: [20, 22]

    defaults:
      run:
        working-directory: community-savings-app-backend

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: community-savings-app-backend/package-lock.json

      - run: npm ci

      - name: npm Audit
        run: npm audit --audit-level=moderate

################################################################################
# Trivy Filesystem Scan
################################################################################

  trivy:

    name: Trivy Filesystem Scan

    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

      - uses: actions/checkout@v4

      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

################################################################################
# Secret Detection
################################################################################

  gitleaks:

    name: Secret Detection

    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

################################################################################
# OSV Vulnerability Scan
################################################################################

  osv:

    name: OSV Scanner

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v1
        with:
          scan-args: |-
            --recursive
            .

################################################################################
# Upload Security Reports
################################################################################

  reports:

    name: Publish Security Reports

    runs-on: ubuntu-latest

    if: always()

    needs:
      - codeql
      - frontend-audit
      - backend-audit
      - trivy
      - gitleaks
      - osv

    steps:

      - name: Create Summary
        run: |
          {
            echo "# Enterprise Security Scan Summary"
            echo ""
            echo "| Check | Status |"
            echo "|------|--------|"
            echo "| CodeQL | Completed |"
            echo "| Dependency Review | Completed (PR only) |"
            echo "| npm Audit (Frontend) | Completed |"
            echo "| npm Audit (Backend) | Completed |"
            echo "| Trivy Filesystem Scan | Completed |"
            echo "| Gitleaks Secret Scan | Completed |"
            echo "| OSV Vulnerability Scan | Completed |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Security Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-artifacts
          path: |
            *.sarif
            trivy-results.sarif
          if-no-files-found: ignore
          