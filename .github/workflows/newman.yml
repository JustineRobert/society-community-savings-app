name: Enterprise API Integration Tests (Newman)

on:
  push:
    branches:
      - main
      - develop
      - release/**
      - feature/**
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: newman-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test

jobs:

################################################################################
# Newman Integration Tests
################################################################################

  newman:

    name: Newman API Tests (Node ${{ matrix.node }})

    runs-on: ubuntu-latest

    timeout-minutes: 40

    strategy:

      fail-fast: false

      matrix:
        node: [20,22]

    services:

      mongodb:

        image: mongo:7

        ports:
          - 27017:27017

        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

      redis:

        image: redis:7

        ports:
          - 6379:6379

        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:

################################################################################
# Checkout
################################################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

################################################################################
# Node
################################################################################

      - name: Setup Node
        uses: actions/setup-node@v4

        with:

          node-version: ${{ matrix.node }}

          cache: npm

          cache-dependency-path: |
            package-lock.json
            community-savings-app-backend/package-lock.json

################################################################################
# Install
################################################################################

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Backend Dependencies
        working-directory: community-savings-app-backend
        run: npm ci

################################################################################
# Install Newman Reporters
################################################################################

      - name: Install Newman Reporters

        run: |

          npm install -g newman

          npm install -g newman-reporter-htmlextra

          npm install -g newman-reporter-junitfull

################################################################################
# Environment Validation
################################################################################

      - name: Validate Environment

        run: |

          node --version

          npm --version

          mongosh --version || true

################################################################################
# Seed Database
################################################################################

      - name: Seed Admin User

        working-directory: community-savings-app-backend

        env:

          MONGO_URI: mongodb://127.0.0.1:27017/community-savings-test

          REDIS_URL: redis://127.0.0.1:6379

          ADMIN_EMAIL: admin@example.com

          ADMIN_PASS: AdminPass123!

          ADMIN_FORCE: "true"

        run: |

          npm run seed-admin --silent

################################################################################
# Build Backend
################################################################################

      - name: Verify Backend Builds

        working-directory: community-savings-app-backend

        run: |

          npm run lint --if-present

          npm run build --if-present

################################################################################
# Start API
################################################################################

      - name: Start Backend

        working-directory: community-savings-app-backend

        env:

          PORT: 5000

          NODE_ENV: test

          JWT_SECRET: github-actions-secret

          JWT_REFRESH_SECRET: github-refresh-secret

          MONGO_URI: mongodb://127.0.0.1:27017/community-savings-test

          REDIS_URL: redis://127.0.0.1:6379

        run: |

          npm run dev > backend.log 2>&1 &

################################################################################
# Wait For API
################################################################################

      - name: Wait For API

        run: |

          echo "Waiting for backend..."

          for i in {1..90}

          do

            if curl -fs http://127.0.0.1:5000/health >/dev/null 2>&1; then

              echo "Backend Ready"

              exit 0

            fi

            sleep 2

          done

          echo "Backend failed to start"

          cat community-savings-app-backend/backend.log || true

          exit 1

################################################################################
# Run Newman
################################################################################

      - name: Execute Postman Collection

        run: |

          mkdir -p postman/reports

          newman run postman/Community-Savings.postman_collection.json \
            -e postman/Test.postman_environment.json \
            --timeout-request 60000 \
            --timeout-script 60000 \
            --delay-request 100 \
            --bail \
            -r cli,json,junitfull,htmlextra \
            --reporter-json-export postman/reports/newman.json \
            --reporter-junitfull-export postman/reports/junit.xml \
            --reporter-htmlextra-export postman/reports/report.html

################################################################################
# Upload Reports
################################################################################

      - name: Upload Newman Reports

        uses: actions/upload-artifact@v4

        if: always()

        with:

          name: newman-reports-node-${{ matrix.node }}

          path: |

            postman/reports

################################################################################
# Upload Backend Logs
################################################################################

      - name: Upload Backend Logs

        if: failure()

        uses: actions/upload-artifact@v4

        with:

          name: backend-logs-node-${{ matrix.node }}

          path: |

            community-savings-app-backend/backend.log

################################################################################
# Summary
################################################################################

      - name: Publish Summary

        if: always()

        run: |

          {

            echo "# Newman Integration Test Summary"

            echo ""

            echo "| Item | Status |"

            echo "|------|--------|"

            echo "| Backend Started | ✅ |"

            echo "| MongoDB | ✅ |"

            echo "| Redis | ✅ |"

            echo "| Admin Seed | ✅ |"

            echo "| Postman Collection | Executed |"

            echo "| HTML Report | Generated |"

            echo "| JSON Report | Generated |"

            echo "| JUnit Report | Generated |"

            echo "| Artifacts | Uploaded |"

          } >> $GITHUB_STEP_SUMMARY